<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promart | Your Marketplace</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="header-main">
            <div class="logo-badge">
                <img src="logo.png" alt="Yalus Logo" class="main-logo">
            </div>
            <h1>PROMART 🛒</h1>
        </div>
        <p class="slogan">A great place to find your needs</p>
    </header>

    <div class="controls-container">
        <div class="search-wrapper">
            <input type="text" id="searchInput" placeholder="Search for anything..." onkeyup="searchMarket()">
        </div>
        
        <div class="dropdown">
            <button class="drop-btn" onclick="toggleDropdown()">Filter ▼</button>
            <div id="categoryDrop" class="dropdown-content">
                <div onclick="filterBy('All')">All Categories</div>
                <div onclick="filterBy('Service')">Artisans</div>
                <div onclick="filterBy('Electronics')">Electronics</div>
                <div onclick="filterBy('Beauty')">Beauty</div>
                <div onclick="filterBy('Fashion')">Fashion</div>
                <div onclick="filterBy('Groceries')">Groceries</div>
            </div>
        </div>
    </div>

    <main class="content-area">
        <div class="market-grid" id="marketGrid"></div>
    </main>

    <button class="fab" onclick="toggleModal('postModal', true)">+</button>

    <div id="postModal" class="modal">
        <div class="modal-content">
            <h2>Post an Offer</h2>
            <select id="listingCategory">
                <option value="Service">Service</option>
                <option value="Electronics">Electronics</option>
                <option value="Beauty">Beauty</option>
                <option value="Fashion">Fashion</option>
                <option value="Groceries">Groceries</option>
            </select>
            <input type="text" id="listingTitle" placeholder="Item or Service Name">
            <input type="text" id="listingPrice" placeholder="Price (₦)">
            <input type="tel" id="listingPhone" placeholder="WhatsApp Number">
            <textarea id="listingDesc" rows="3" placeholder="Description..."></textarea>
            <input type="file" id="listingFile" accept="image/*" onchange="handleImage(this)">
            <img id="imagePreview" style="display:none; width:100%; height:120px; object-fit:cover; border-radius:10px; margin-top:10px;">
            <button class="btn-submit" onclick="saveToMarket()">PUBLISH</button>
            <button onclick="toggleModal('postModal', false)" class="btn-cancel">Close</button>
        </div>
    </div>

    <footer>
        <p>Powered by <span>Yalus Energy</span></p>
    </footer>

    <script src="Script.js"></script>
</body>
</html>
